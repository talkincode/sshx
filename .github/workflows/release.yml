name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # 移除 'v' 前缀以匹配 CHANGELOG 中的版本号
          VERSION_NUMBER="${VERSION#v}"

          # 提取对应版本的 changelog
          awk -v ver="$VERSION_NUMBER" '
            /^## \['"$VERSION_NUMBER"'\]/ { flag=1; next }
            /^## \[/ { if(flag) exit }
            flag { print }
          ' CHANGELOG.md > /tmp/release_notes.md

          # 如果没有提取到内容，使用默认消息
          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry found for version $VERSION_NUMBER" > /tmp/release_notes.md
            echo "Please check CHANGELOG.md for details." >> /tmp/release_notes.md
          fi

          # 输出到环境变量
          {
            echo 'CHANGELOG<<EOF'
            cat /tmp/release_notes.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          # 创建输出目录
          mkdir -p dist

          # 定义构建函数
          build() {
            local os=$1
            local arch=$2
            local output="dist/sshx-${os}-${arch}"

            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi

            echo "Building for $os/$arch..."
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build \
              -ldflags="-s -w -X main.Version=${{ steps.get_version.outputs.VERSION }}" \
              -o "$output" \
              ./cmd/sshx

            # 压缩二进制文件
            if [ "$os" = "windows" ]; then
              zip "dist/sshx-${os}-${arch}.zip" "$output"
              rm "$output"
            else
              tar czf "dist/sshx-${os}-${arch}.tar.gz" -C dist "$(basename $output)"
              rm "$output"
            fi
          }

          # 构建所有平台
          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64
          build windows arm64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## SSHX - Secure SSH & SFTP Client with Built-in Password Manager

            ### 📋 What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### 🚀 Quick Install

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            ---

            ### 📦 Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 | `sshx-linux-amd64.tar.gz` |
            | Linux | ARM64 | `sshx-linux-arm64.tar.gz` |
            | macOS | Intel | `sshx-darwin-amd64.tar.gz` |
            | macOS | Apple Silicon | `sshx-darwin-arm64.tar.gz` |
            | Windows | x86_64 | `sshx-windows-amd64.zip` |
            | Windows | ARM64 | `sshx-windows-arm64.zip` |

            **Verify downloads:** Use `checksums.txt` for integrity verification

            ---

            ### 📚 Documentation

            - [Full Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
            - [Installation Guide](https://github.com/${{ github.repository }}/blob/main/README.md#installation)
            - [Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

          files: |
            dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*
          retention-days: 30

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    env:
      # Set HOMEBREW_TAP_TOKEN (a fine-grained PAT with push access to the tap
      # repo) to enable this job. Without it the job no-ops, so releases from
      # forks or before the secret is configured never fail. HOMEBREW_TAP_REPO
      # is the `homebrew-<tap>` repository backing `brew install <owner>/tap/sshx`.
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPO: talkincode/homebrew-tap
    steps:
      - name: Download release artifacts
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist-artifacts

      - name: Render and push formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"   # e.g. v1.2.0
          VERSION="${TAG#v}"                # e.g. 1.2.0
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          CHECKSUMS="dist-artifacts/checksums.txt"

          # Look up the sha256 for a given archive name from checksums.txt
          # (format: "<sha256>  <filename>", as produced by `sha256sum *`).
          sha() {
            local hash
            hash="$(awk -v f="$1" '$2 == f { print $1; exit }' "$CHECKSUMS")"
            [ -n "$hash" ] || { echo "missing checksum for $1" >&2; exit 1; }
            echo "$hash"
          }

          DARWIN_ARM64_SHA="$(sha sshx-darwin-arm64.tar.gz)"
          DARWIN_AMD64_SHA="$(sha sshx-darwin-amd64.tar.gz)"
          LINUX_ARM64_SHA="$(sha sshx-linux-arm64.tar.gz)"
          LINUX_AMD64_SHA="$(sha sshx-linux-amd64.tar.gz)"

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/sshx.rb <<EOF
          class Sshx < Formula
            desc "Barrier-free SSH/SFTP CLI with a built-in OS-keyring password manager"
            homepage "https://github.com/talkincode/sshx"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/sshx-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${BASE_URL}/sshx-darwin-amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/sshx-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "${BASE_URL}/sshx-linux-amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              # Each archive contains a single, platform-suffixed binary
              # (e.g. sshx-darwin-arm64); rename it to the plain "sshx" command.
              bin.install Dir["sshx-*"].first => "sshx"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sshx --version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sshx.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${VERSION}"
          else
            git commit -m "sshx ${VERSION}"
            git push
          fi
